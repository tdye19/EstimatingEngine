[tool.pytest.ini_options]
testpaths = ["apex/backend/tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "S", "UP"]
ignore = [
    "E712",  # SQLAlchemy == False comparisons
    "S101",  # assert in tests
    "B008",  # FastAPI Depends() in defaults
    "E501",  # line too long — line-length=120 already set; long lines are pre-existing string literals
    "S110",  # try-except-pass — intentional suppression of expected errors throughout codebase
    "S105",  # hardcoded passwords — test tokens / fixture placeholders
    "S108",  # insecure temp file — standard tempfile usage in upload handling
    "S310",  # suspicious URL open — intentional file:// and http:// handling
    "S324",  # insecure hash function — pre-existing, not security-sensitive contexts
    "S112",  # continue in except — intentional loop control
    "B023",  # function definition in loop — pre-existing pattern, refactor deferred
    "UP031", # %-format strings — pre-existing, not worth forced migration
]

[tool.ruff.lint.per-file-ignores]
# load_dotenv() must be called before apex imports to ensure env vars are
# available when module-level code reads them — E402 here is intentional.
"apex/backend/main.py" = ["E402"]
# projects.py imports slowapi Limiter after router creation — intentional ordering.
"apex/backend/routers/projects.py" = ["E402"]
# Test files use conditional imports and lazy fixtures that require E402 patterns.
"apex/backend/tests/*.py" = ["E402"]
# Alembic migration files use deferred imports for revision chaining.
"apex/backend/alembic/versions/*.py" = ["E402"]
