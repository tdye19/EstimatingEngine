[build]
builder = "nixpacks"

[deploy]
startCommand = "PYTHONPATH=. /opt/venv/bin/alembic -c apex/backend/alembic.ini upgrade head && /opt/venv/bin/gunicorn apex.backend.main:app --worker-class uvicorn.workers.UvicornWorker --workers 4 --timeout 300 --keep-alive 120 --max-requests 5000 --max-requests-jitter 500 --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
