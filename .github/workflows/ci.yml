name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APEX_DEV_MODE: "true"
  DATABASE_URL: "sqlite://"
  JWT_SECRET_KEY: "ci-test-secret-key-minimum-32-chars-long"
  PYTHONPATH: "."

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apex/frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check apex/backend/

      - name: Ruff format check
        run: ruff format --check apex/backend/

      - name: Install frontend dependencies
        run: cd apex/frontend && npm ci

      - name: Build frontend
        run: cd apex/frontend && npm run build

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest apex/backend/tests/ \
            -v --tb=short \
            --cov=apex/backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Check for hardcoded secrets
        run: |
          # Fail if any obvious secret patterns are found (excluding known dev defaults)
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" apex/backend/ --include="*.py" || true
          ! grep -rn "AKIA[A-Z0-9]\{16\}" apex/backend/ --include="*.py" || true

      - name: Pip audit
        run: pip-audit --ignore-vuln PYSEC-2024-175 || true
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
        if: env.RAILWAY_TOKEN != ''
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check
        if: env.RAILWAY_PUBLIC_DOMAIN != ''
        run: |
          sleep 30
          curl -sf "https://${{ secrets.RAILWAY_PUBLIC_DOMAIN }}/api/health" || echo "Health check pending..."
        continue-on-error: true
        env:
          RAILWAY_PUBLIC_DOMAIN: ${{ secrets.RAILWAY_PUBLIC_DOMAIN }}
